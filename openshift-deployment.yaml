apiVersion: v1
kind: List
metadata:
  name: springboot-openshift-app
items:
  # Service
  - apiVersion: v1
    kind: Service
    metadata:
      name: springboot-app-service
      labels:
        app: springboot-app
    spec:
      type: ClusterIP
      ports:
        - port: 8080
          targetPort: 8080
          protocol: TCP
          name: http
      selector:
        app: springboot-app

  # Deployment
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: springboot-app-deployment
      labels:
        app: springboot-app
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: springboot-app
      template:
        metadata:
          labels:
            app: springboot-app
        spec:
          containers:
            - name: springboot-app
              image: springboot-openshift-app:latest
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 8080
                  name: http
              env:
                - name: JAVA_OPTIONS
                  value: "-Xmx512m -Xms256m"
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8080
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8080
                initialDelaySeconds: 10
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 3

  # Route (for OpenShift)
  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: springboot-app-route
      labels:
        app: springboot-app
    spec:
      port:
        targetPort: http
      to:
        kind: Service
        name: springboot-app-service
        weight: 100
      wildcardPolicy: None

  # HorizontalPodAutoscaler
  - apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      name: springboot-app-hpa
      labels:
        app: springboot-app
    spec:
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: springboot-app-deployment
      minReplicas: 2
      maxReplicas: 5
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 70
        - type: Resource
          resource:
            name: memory
            target:
              type: Utilization
              averageUtilization: 80
